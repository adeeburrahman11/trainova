name: trainova
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_local_notifications: ^21.0.0
  google_fonts: ^8.0.2
  http: ^1.6.0
  image_picker: ^1.2.1
  intl: ^0.20.2
  package_info_plus: ^10.0.0
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"

flutter_native_splash:
  color: "#121212"
  image: "assets/icon.png"
  color_dark: "#121212"
  image_dark: "assets/icon.png"
  android_12:
    color: "#121212"
    image: "assets/icon.png"
    color_dark: "#121212"
    image_dark: "assets/icon.png"
